<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FotMob MCP banner</title>
  <desc id="desc">A football pitch inspired banner for the FotMob MCP server.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1F1A"/>
      <stop offset="0.55" stop-color="#123D32"/>
      <stop offset="1" stop-color="#0D2135"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="80" x2="1120" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <g opacity="0.18">
    <path d="M84 70H1196V350H84V70Z" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M640 70V350" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="640" cy="210" r="72" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M84 150H210V270H84" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M1196 150H1070V270H1196" stroke="#FFFFFF" stroke-width="3"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="96" y="74" width="500" height="272" rx="24" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="136" y="150" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800" letter-spacing="0">FotMob MCP</text>
    <text x="138" y="202" fill="#D1FAE5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600">Live football data for AI agents</text>
    <text x="138" y="250" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20">Fixtures, teams, players, match details,</text>
    <text x="138" y="282" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20">league stats, search, and live fixture polling.</text>
  </g>
  <g transform="translate(750 104)" filter="url(#shadow)">
    <rect width="378" height="212" rx="24" fill="#06130F" fill-opacity="0.72" stroke="url(#accent)" stroke-opacity="0.7"/>
    <circle cx="76" cy="74" r="28" fill="url(#accent)"/>
    <path d="M76 46L84.2 64.4L104 66.5L89.2 80L93.3 99.5L76 89.6L58.7 99.5L62.8 80L48 66.5L67.8 64.4L76 46Z" fill="#062018"/>
    <text x="128" y="72" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700">MCP-ready</text>
    <text x="128" y="110" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">stdio, SSE, streamable HTTP</text>
    <path d="M44 148H334" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <text x="44" y="184" fill="#A7F3D0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18">fotmob-mcp --help</text>
  </g>
</svg>
